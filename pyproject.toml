[project]
name = "logic-as-loss"
version = "0.1.0"
description = "A library for converting predicate logic expressions into differentiable PyTorch loss functions"
authors = [
    {name = "Vivek Srikumar",email = "svivek@cs.utah.edu"}
]
readme = "README.md"
requires-python = ">=3.12,<3.15"
dependencies = [
    "torch (>=2.9.1,<3.0.0)",
    "sympy (>=1.14.0,<2.0.0)"
]

[tool.poetry]
packages = [{include = "logic_as_loss", from = "src"}]


[tool.poetry.group.dev.dependencies]
pytest = "^9.0.2"
black = "^25.12.0"
flake8 = "^7.3.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
